name: Ultimate Friend Monitor
on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch:

jobs:
  check_all_activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Monitor Every Move
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # 1. إشعار بدء الفحص
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" -d "chat_id=$CHAT_ID&text=🔍 جاري فحص حساب خويك الآن..."

          # 2. جلب آخر حدث
          LATEST_EVENT=$(curl -s "https://api.github.com/users/sasziz/events/public" | jq -r '.[0]')
          EVENT_ID=$(echo $LATEST_EVENT | jq -r '.id')
          EVENT_TYPE=$(echo $LATEST_EVENT | jq -r '.type')
          REPO_NAME=$(echo $LATEST_EVENT | jq -r '.repo.name')
          
          LAST_SAVED_ID=$(cat last_event_id.txt 2>/dev/null || echo "0")

          # 3. المقارنة واتخاذ الإجراء
          if [ "$EVENT_ID" != "$LAST_SAVED_ID" ] && [ "$EVENT_ID" != "null" ]; then
            
            if [ "$EVENT_TYPE" == "PushEvent" ]; then
                MSG="✅ لقيت حركة! خويك عدل ملفات في: $REPO_NAME"
            elif [ "$EVENT_TYPE" == "CreateEvent" ]; then
                MSG="🚀 لقيت حركة! خويك أنشأ شي جديد في: $REPO_NAME"
            else
                MSG="🔔 فيه نشاط جديد ($EVENT_TYPE) في مشروع: $REPO_NAME"
            fi

            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
                 -d "chat_id=$CHAT_ID&text=$MSG%0Aالرابط: https://github.com/$REPO_NAME"

            echo $EVENT_ID > last_event_id.txt
            
            # حفظ التغيير في جيت هاب
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git add last_event_id.txt
            git commit -m "Update last event ID"
            git push
          else
            # رسالة في حال عدم وجود تغيير
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" -d "chat_id=$CHAT_ID&text=😴 لا يوجد أي تغيير جديد حالياً."
          fi
