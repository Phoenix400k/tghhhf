Entername: Ultimate Friend Monitor
on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch:

jobs:
  check_all_activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Monitor Every Move
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # 1. جلب آخر حدث (Event) قام به المستخدم
          # هذا الرابط يجلب قائمة بكل الحركات (Push, Create, Fork, etc.)
          LATEST_EVENT=$(curl -s "https://api.github.com/users/sasziz/events/public" | jq -r '.[0]')
          
          EVENT_ID=$(echo $LATEST_EVENT | jq -r '.id')
          EVENT_TYPE=$(echo $LATEST_EVENT | jq -r '.type')
          REPO_NAME=$(echo $LATEST_EVENT | jq -r '.repo.name')
          
          # 2. قراءة آخر آيدي حدث حفظناه
          LAST_SAVED_ID=$(cat last_event_id.txt 2>/dev/null || echo "0")

          # 3. إذا كان هناك حدث جديد (آيدي مختلف)
          if [ "$EVENT_ID" != "$LAST_SAVED_ID" ] && [ "$EVENT_ID" != "null" ]; then
            
            # تحديد نوع الرسالة بناءً على نوع الحركة
            if [ "$EVENT_TYPE" == "PushEvent" ]; then
                MSG="📝 خويك عدل ملفات (Push) في مشروع: $REPO_NAME"
            elif [ "$EVENT_TYPE" == "CreateEvent" ]; then
                MSG="🚀 خويك أنشأ شي جديد (مشروع أو فرع) في: $REPO_NAME"
            else
                MSG="🔔 فيه نشاط جديد ($EVENT_TYPE) في حساب خويك بمشروع: $REPO_NAME"
            fi

            # إرسال الرسالة لتليجرام
            if [ "$LAST_SAVED_ID" != "0" ]; then
               curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
                 -d "chat_id=$CHAT_ID&text=$MSG%0Aالرابط: https://github.com/$REPO_NAME"
            fi

            # حفظ الآيدي الجديد
            echo $EVENT_ID > last_event_id.txt
            
            # 4. حفظ التغييرات في مستودعك
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git add last_event_id.txt
            git commit -m "Update last event ID: $EVENT_ID"
            git push
          else
            echo "لا يوجد نشاط جديد حالياً."
          fi
